<!-- Ambient Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">

<div class="orb w-[400px] h-[400px] bg-tertiary rounded-full bottom-0 -right-24"></div>

                </button>
<button class="flex-1 py-3 px-6 rounded-full text-sm font-medium transition-all duration-300 text-on-surface-variant hover:text-on-surface">
                    Sign Up
                </button>
</div>
<form class="space-y-8" onsubmit="return false;">
<!-- Email Input -->
<div class="group relative">
<label class="block font-label text-label-sm text-on-surface-variant mb-3 tracking-widest uppercase">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-6 bg-surface-container-highest rounded-lg border-none ring-1 ring-outline-variant/10 focus:ring-primary focus:bg-surface-bright transition-all duration-300 text-on-surface placeholder:text-outline/40" placeholder="name@domain.com" type="email"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<!-- Password Input -->
<div class="group relative">
<div class="flex justify-between items-end mb-3">
<label class="font-label text-label-sm text-on-surface-variant tracking-widest uppercase">Secret Key</label>
<a class="text-[10px] text-primary/80 hover:text-primary transition-colors uppercase tracking-wider font-bold" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-6 bg-surface-container-highest rounded-lg border-none ring-1 ring-outline-variant/10 focus:ring-primary focus:bg-surface-bright transition-all duration-300 text-on-surface placeholder:text-outline/40" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
</div>
